services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evidenceiq-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HOST_API_PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env using openssl rand -hex 32}
      DATABASE_URL: sqlite:////app/storage/evidenceiq.db
      STORAGE_ROOT: /app/storage
      OLLAMA_BASE_URL: http://ollama:11434
      CHROMA_DB_PATH: /app/storage/chromadb
      ANONYMIZED_TELEMETRY: "False"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    volumes:
      - evidenceiq-storage:/app/storage
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - evidenceiq-network
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    container_name: evidenceiq-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HOST_OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - evidenceiq-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ollama-models:
    image: ollama/ollama:latest
    profiles:
      - models
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - evidenceiq-network
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        ollama pull llava
        ollama pull bakllava
        ollama pull moondream
        ollama pull mistral

volumes:
  evidenceiq-storage:
    driver: local
  ollama-data:
    driver: local

networks:
  evidenceiq-network:
    driver: bridge
